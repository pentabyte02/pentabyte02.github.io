<!doctype html>
<html lang="es" class="light dark">
  <head>
    <meta charset="UTF-8" />
    <title>Archivos y Cámara - Sweep</title>
    <meta name="description" content="Sweep - Archivos y Cámara" />

    <meta name="viewport" content="width=device-width" />
    <meta name="theme-color" content="#1c1b1f" />

    <link rel="icon" sizes="32x32" href="favicon.ico" />
    <link rel="manifest" href="site.webmanifest" />

    <!-- COMPONENTES -->
    <script type="module" src="js/lib/custom/md-app-bar.js"></script>
    <script type="module" src="js/nav-tab-fixed.js"></script>

    <!-- ESTILOS -->
    <link rel="stylesheet" href="css/material-symbols-outlined.css" />
    <link rel="stylesheet" href="css/theme/light.css" />
    <link rel="stylesheet" href="css/theme/dark.css" />
    <link rel="stylesheet" href="css/estilos.css" />
    <link rel="stylesheet" href="css/transicion_pestanas.css" />
    <link rel="stylesheet" href="css/md-tab.css" />
    <link rel="stylesheet" href="css/md-filled-text-field.css" />
    <link rel="stylesheet" href="css/md-filled-button.css" />
    <link rel="stylesheet" href="css/md-outline-button.css" />
  </head>

  <body>
    <form id="formulario" novalidate>
      <!-- APP BAR -->
      <md-app-bar class="centered" adicional="tab">
        <h1>Archivos y Cámara</h1>
      </md-app-bar>

      <!-- NAV -->
      <nav-tab-fixed id="tab"></nav-tab-fixed>

      <section class="page-content">
        <!-- RESPUESTA -->
        <p>
          <label class="md-filled-text-field float">
            <output name="respuesta"
              >No se ha seleccionado ningún archivo</output
            >
            <span>Estado</span>
          </label>
        </p>

        <!-- TOMAR FOTO -->
        <p>
          <label class="md-filled-text-field float">
            <input
              type="file"
              name="foto"
              accept="image/*"
              capture="environment"
            />
            <span>Tomar Foto</span>
          </label>
        </p>

        <!-- GRABAR VIDEO -->
        <p>
          <label class="md-filled-text-field float">
            <input type="file" name="video" accept="video/*" capture />
            <span>Grabar Video</span>
          </label>
        </p>

        <!-- SELECCIONAR ARCHIVO -->
        <p>
          <label class="md-filled-text-field float">
            <input type="file" name="archivo" />
            <span>Seleccionar Archivo</span>
          </label>
        </p>

        <!-- BOTONES -->
        <p>
          <button id="botonMostrar" class="md-filled-button">
            Mostrar Archivo
          </button>
          <button type="reset" class="md-outline-button">Limpiar</button>
        </p>
      </section>
    </form>

    <script type="module">
      formulario.addEventListener("submit", procesa);

      function procesa(evt) {
        evt.preventDefault();

        const foto = formulario.foto.files[0];
        const video = formulario.video.files[0];
        const archivo = formulario.archivo.files[0];

        if (foto) {
          formulario.respuesta.value = `Foto seleccionada: ${foto.name}`;
        } else if (video) {
          formulario.respuesta.value = `Video seleccionado: ${video.name}`;
        } else if (archivo) {
          formulario.respuesta.value = `Archivo seleccionado: ${archivo.name}`;
        } else {
          formulario.respuesta.value = "No se seleccionó ningún archivo";
        }
      }
    </script>
  </body>
</html>
