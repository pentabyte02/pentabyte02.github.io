<!doctype html>
<html lang="es" class="light dark">
  <head>
    <meta charset="UTF-8" />
    <title>Cámara - Sweep</title>

    <!-- SEO básico -->
    <meta
      name="description"
      content="Sweep - PWA con acceso a cámara y grabación de video"
    />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Color de la barra del sistema -->
    <meta name="theme-color" content="#1c1b1f" />

    <!-- PWA -->
    <link rel="manifest" href="site.webmanifest" />
    <link rel="icon" sizes="32x32" href="favicon.ico" />

    <!-- MATERIAL SYMBOLS -->
    <link rel="stylesheet" href="css/material-symbols-outlined.css" />

    <!-- TEMAS -->
    <link rel="stylesheet" href="css/theme/light.css" />
    <link rel="stylesheet" href="css/theme/dark.css" />

    <!-- ESTILOS BASE -->
    <link rel="stylesheet" href="css/estilos.css" />

    <!-- COMPONENTES MATERIAL -->
    <link rel="stylesheet" href="css/md-tab.css" />
    <link rel="stylesheet" href="css/md-filled-text-field.css" />
    <link rel="stylesheet" href="css/md-filled-button.css" />
    <link rel="stylesheet" href="css/md-outline-button.css" />
    <link rel="stylesheet" href="css/md-headline.css" />
    <link rel="stylesheet" href="css/md-list.css" />

    <!-- TRANSICIONES -->
    <link rel="stylesheet" href="css/transicion_pestanas.css" />

    <!-- WEB COMPONENTS -->
    <script type="module" src="js/lib/custom/md-app-bar.js"></script>
    <script type="module" src="js/nav-tab-fixed.js"></script>
  </head>

  <body>
    <form id="formulario" novalidate>
      <md-app-bar class="centered" adicional="tab">
        <h1>Cámara Directa</h1>
      </md-app-bar>

      <nav-tab-fixed id="tab"></nav-tab-fixed>

      <section class="page-content">
        <section>
          <div class="botones">
            <button
              type="button"
              id="btnInicia"
              class="md-filled-button"
              onclick="inicia()"
            >
              <span class="material-symbols-outlined">videocam</span>
              Iniciar cámara
            </button>

            <button
              type="button"
              id="btnParar"
              class="md-outline-button"
              onclick="para()"
              disabled
            >
              <span class="material-symbols-outlined">stop</span>
              Parar
            </button>

            <button
              type="button"
              id="btnGraba"
              class="md-outline-button"
              onclick="graba()"
              disabled
            >
              <span class="material-symbols-outlined">fiber_manual_record</span>
              Grabar
            </button>

            <button
              type="button"
              id="btnCaptura"
              class="md-outline-button"
              onclick="captura()"
              disabled
            >
              <span class="material-symbols-outlined">photo_camera</span>
              Capturar
            </button>
          </div>
        </section>

        <section>
          <h3>Preview</h3>
          <video id="preview" autoplay muted playsinline></video>
        </section>

        <section>
          <h3>Grabación</h3>
          <video id="recording" controls></video>
          <p><a id="descarga">Descargar Video</a></p>
        </section>

        <section>
          <h3>Imagen</h3>
          <canvas id="canvas"></canvas>
          <p><a id="descargaImagen">Descargar Imagen</a></p>
        </section>

        <section id="mensajes"></section>
      </section>
    </form>

    <script>
      let stream = null;
      const TIEMPO_DE_GRABACION = 5000;

      const preview = document.getElementById("preview");
      const recording = document.getElementById("recording");
      const descarga = document.getElementById("descarga");
      const descargaImagen = document.getElementById("descargaImagen");
      const mensajes = document.getElementById("mensajes");
      const canvas = document.getElementById("canvas");
      const context = canvas.getContext("2d");

      const btnInicia = document.getElementById("btnInicia");
      const btnParar = document.getElementById("btnParar");
      const btnGraba = document.getElementById("btnGraba");
      const btnCaptura = document.getElementById("btnCaptura");

      async function inicia() {
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: true,
          });

          preview.srcObject = stream;
          await new Promise((resolve) => (preview.onplaying = resolve));

          document.body.classList.add("camara-activa");

          // Estados funcionales
          btnParar.disabled = false;
          btnGraba.disabled = false;
          btnCaptura.disabled = false;
          btnInicia.disabled = true;

          // Estados visuales (CLASES)
          btnParar.classList.remove("md-outline-button");
          btnParar.classList.add("md-filled-button");

          btnInicia.classList.remove("md-filled-button");
          btnInicia.classList.add("md-outline-button");

          log("Cámara iniciada.");
        } catch (e) {
          log(e.message);
        }
      }

      async function graba() {
        try {
          const recordedChunks = await grabaClip(stream, TIEMPO_DE_GRABACION);
          let recordedBlob = new Blob(recordedChunks, { type: "video/webm" });

          recording.src = URL.createObjectURL(recordedBlob);
          descarga.href = recording.src;
          descarga.download = "video.webm";

          log("Video grabado correctamente.");
        } catch (e) {
          log(e.message);
        }
      }

      function para() {
        if (stream) {
          stream.getTracks().forEach((track) => track.stop());
          stream = null;
        }

        document.body.classList.remove("camara-activa");

        // Estados funcionales
        btnParar.disabled = true;
        btnGraba.disabled = true;
        btnCaptura.disabled = true;
        btnInicia.disabled = false;

        // Restaurar clases visuales originales
        btnParar.classList.remove("md-filled-button");
        btnParar.classList.add("md-outline-button");

        btnInicia.classList.remove("md-outline-button");
        btnInicia.classList.add("md-filled-button");

        log("Cámara detenida.");
      }

      function captura() {
        const width = preview.videoWidth;
        const height = preview.videoHeight;

        canvas.width = width;
        canvas.height = height;

        context.drawImage(preview, 0, 0, width, height);

        descargaImagen.href = canvas.toDataURL("image/jpeg");
        descargaImagen.download = "imagen.jpg";

        log("Imagen capturada.");
      }

      function grabaClip(stream, milisegundos) {
        let recorder = new MediaRecorder(stream);
        let data = [];

        recorder.ondataavailable = (event) => data.push(event.data);
        recorder.start();

        let detenido = new Promise((resolve, reject) => {
          recorder.onstop = resolve;
          recorder.onerror = (event) => reject(event.name);
        });

        let grabado = new Promise((resolve) =>
          setTimeout(() => {
            if (recorder.state === "recording") recorder.stop();
            resolve();
          }, milisegundos),
        );

        return Promise.all([detenido, grabado]).then(() => data);
      }

      function log(msg) {
        mensajes.innerHTML += msg + "<br>";
      }
    </script>
  </body>
</html>
