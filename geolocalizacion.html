<!doctype html>
<html lang="es" class="dark-medium-contrast">
  <head>
    <meta charset="UTF-8" />
    <title>Geolocalización - Sweep</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1c1b1f" />
    <link rel="manifest" href="site.webmanifest" />

    <!-- MATERIAL SYMBOLS -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />

    <!-- ESTILOS BASE -->
    <link rel="stylesheet" href="css/styles.css" />

    <!-- PALETA -->
    <link rel="stylesheet" href="css/light-mc.css" />
    <link rel="stylesheet" href="css/dark-mc.css" />
  </head>

  <body>
    <header class="app-bar">
      <h1>Geolocalización</h1>
    </header>

    <main class="page-content">
      <div class="data-card">
        <span class="label">Latitud</span>
        <output id="latitud">--</output>
      </div>

      <div class="data-card">
        <span class="label">Longitud</span>
        <output id="longitud">--</output>
      </div>
    </main>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <span class="material-symbols-outlined">home</span>
        <span>Inicio</span>
      </a>

      <a href="geolocalizacion.html" class="nav-item active">
        <span class="material-symbols-outlined">location_on</span>
        <span>Geo</span>
      </a>

      <a href="camara.html" class="nav-item">
        <span class="material-symbols-outlined">photo_camera</span>
        <span>Cámara</span>
      </a>

      <a href="archivos.html" class="nav-item">
        <span class="material-symbols-outlined">folder</span>
        <span>Archivos</span>
      </a>

      <a href="copyright.html" class="nav-item">
        <span class="material-symbols-outlined">info</span>
        <span>Info</span>
      </a>
    </nav>

    <script>
      // ===== GEOLOCALIZACIÓN =====
      if ("geolocation" in navigator) {
        navigator.geolocation.watchPosition(
          (p) => {
            document.getElementById("latitud").value = p.coords.latitude;
            document.getElementById("longitud").value = p.coords.longitude;
          },
          (error) => {
            alert("Error obteniendo ubicación: " + error.message);
          }
        );
      } else {
        alert("Geolocalización no soportada.");
      }

      // ===== TRANSICIÓN DE PÁGINA =====
      window.addEventListener("DOMContentLoaded", () => {
        const content = document.querySelector(".page-content");
        content.classList.add("page-enter");
      });

      document.querySelectorAll(".bottom-nav a").forEach((link) => {
        link.addEventListener("click", function (e) {
          if (this.href !== window.location.href) {
            e.preventDefault();

            const destino = this.href;
            const content = document.querySelector(".page-content");

            content.classList.remove("page-enter");
            content.classList.add("page-exit");

            setTimeout(() => {
              window.location.href = destino;
            }, 280);
          }
        });
      });
    </script>
  </body>
</html>
